<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detran</title>
</head>
<body>
    <h1>Sistema de Multas</h1>
    <input type="number" name="km" id="km">
    <input type="button" value="Enviar" onclick=calcular()>
    <div id="res"></div>

    <script>
        function calcular () {
            var kmtext = window.document.getElementById('km')
            var kmnumber = Number(kmtext.value)
            var rest = window.document.getElementById('res')

           rest.innerHTML += `<p> Sua velocidade era de ${kmnumber}Km/h </p>`

            if (kmnumber > 65) {
                rest.innerHTML += `<p>Você ultrapassou a velocidade permitida e foi multado! </p>`
            } else {
                rest.innerHTML += `<p> Você não foi multado, estava na velocidade permitida! </p>`
            }
        }

    </script>
</body>
</html>
