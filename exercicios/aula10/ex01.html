<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        div#area{
            font: normal 20pt Arial;
            background-color: rgb(2, 196, 2);
            color: white;
            width: 200px;
            height: 200px;
            text-align: center;
            line-height: 200px;
        }
    </style>
</head>
<body>
    <div id="area">
        Interaja...
    </div>
    <script>
        var p1 = window.document.getElementById('area')
        p1.addEventListener('click', clicar)
        p1.addEventListener('mouseenter', entrar)
        p1.addEventListener('mouseout', sair)

        function clicar() {
            p1.innerText = 'Clicou'
            p1.style.backgroundColor = 'red'

        }

        function entrar() {
            p1.innerText = 'Entrou'
        }

        function sair() {
            p1.innerText = 'Saiu'
            p1.style.backgroundColor = 'green'
        }
    </script>
</body>
</html>
